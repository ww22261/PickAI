<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>PickAI · 帮你找到最对的好物</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens ─── */
:root {
  --ink:       oklch(14% 0.01 60);
  --ink-soft:  oklch(40% 0.01 60);
  --paper:     oklch(97% 0.008 80);
  --warm-1:    oklch(92% 0.025 70);
  --warm-2:    oklch(85% 0.04  70);
  --warm-3:    oklch(65% 0.08  50);
  --accent:    oklch(58% 0.21  28);   /* deep coral-red */
  --accent-lt: oklch(95% 0.04  28);
  --blue:      oklch(52% 0.18 255);
  --white:     oklch(99.5% 0.002 80);
  --shadow-sm: 0 2px 8px oklch(14% 0.01 60 / 0.07);
  --shadow-md: 0 8px 32px oklch(14% 0.01 60 / 0.10);
  --shadow-lg: 0 20px 60px oklch(14% 0.01 60 / 0.14);
  --safe-b:    env(safe-area-inset-bottom, 0px);
  --r-sm: 10px;
  --r-md: 18px;
  --r-lg: 26px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100svh;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── NAV ─── */
.nav {
  position: fixed; top: 0; inset-inline: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  background: oklch(97% 0.008 80 / 0.88);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--warm-2);
}

.logo {
  display: flex; align-items: baseline; gap: 2px;
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--ink);
}
.logo-ai {
  color: var(--accent);
  font-style: italic;
}
.logo-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-bottom: 6px;
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink { 0%,80%,100%{opacity:1} 40%{opacity:.3} }

/* Step progress — editorial dashes */
.progress-bar { display: flex; align-items: center; gap: 5px; }
.step-dash {
  height: 3px; border-radius: 2px;
  background: var(--warm-2);
  transition: width .4s cubic-bezier(.4,0,.2,1), background .3s;
}
.step-dash.short  { width: 14px; }
.step-dash.active { width: 28px; background: var(--accent); }
.step-dash.done   { width: 14px; background: var(--warm-3); }

/* ─── Page System ─── */
.page {
  display: none;
  min-height: 100svh;
  padding-top: 64px;
  animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both;
}
.page.active { display: flex; flex-direction: column; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.page-inner {
  flex: 1;
  display: flex; flex-direction: column;
  max-width: 520px; width: 100%;
  margin: 0 auto;
  padding: 0 22px;
}

/* ─── Page 1: Hero ─── */
.eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  margin-top: 36px; margin-bottom: 18px;
  font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--warm-3);
}
.eyebrow-line {
  width: 28px; height: 1.5px;
  background: var(--warm-3);
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 9vw, 52px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 14px;
}
.hero-title em {
  font-style: italic;
  color: var(--accent);
}
.hero-title .underline-word {
  position: relative; display: inline-block;
  font-style: normal;
}
.hero-title .underline-word::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: 2px;
  height: 3px;
  background: var(--accent);
  border-radius: 2px;
  transform: scaleX(0); transform-origin: left;
  animation: drawLine 1s .6s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes drawLine { to { transform: scaleX(1); } }

.hero-sub {
  font-size: 13.5px; color: var(--ink-soft);
  line-height: 1.7; margin-bottom: 30px;
  max-width: 340px;
}

/* Input area */
.input-wrap { position: relative; margin-bottom: 6px; }

.main-input {
  width: 100%;
  background: var(--white);
  border: 1.5px solid var(--warm-2);
  border-radius: var(--r-md);
  padding: 18px 20px;
  font-size: 14.5px; font-family: inherit;
  color: var(--ink); outline: none;
  resize: none; min-height: 108px; line-height: 1.65;
  transition: border-color .25s, box-shadow .25s;
  box-shadow: var(--shadow-sm);
}
.main-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px oklch(58% 0.21 28 / 0.10), var(--shadow-sm);
}
.main-input::placeholder { color: var(--warm-3); opacity: .7; }

.char-count {
  text-align: right; font-size: 11px;
  color: var(--warm-3); margin-bottom: 22px;
  padding-right: 2px;
}

/* Tag section */
.tags-section { margin-bottom: 24px; }
.tags-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 11px;
}
.tags-title {
  font-size: 12px; font-weight: 700;
  color: var(--ink); letter-spacing: .5px;
}
.btn-refresh {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 11px; border-radius: 20px;
  border: 1px solid var(--warm-2);
  background: transparent;
  font-size: 11px; color: var(--ink-soft);
  cursor: pointer; font-family: inherit;
  transition: all .2s;
}
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

.tags-row { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-chip {
  padding: 7px 14px;
  border-radius: 30px;
  border: 1.5px solid var(--warm-2);
  background: var(--white);
  font-size: 12px; color: var(--ink-soft);
  cursor: pointer;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
}
.tag-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-lt);
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}

/* Error */
.error-msg {
  color: var(--accent); font-size: 12px;
  margin-top: 7px; animation: shake .35s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}
}

/* ─── Buttons ─── */
.btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  width: 100%; padding: 17px;
  border-radius: var(--r-md); border: none;
  background: var(--ink); color: var(--white);
  font-size: 14.5px; font-weight: 700; font-family: inherit;
  cursor: pointer; letter-spacing: .3px;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  position: relative; overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 0%, oklch(99% 0 0 / .08) 100%);
}
.btn-primary:hover {
  background: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px oklch(58% 0.21 28 / 0.3);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary .arrow { transition: transform .2s; }
.btn-primary:hover .arrow { transform: translateX(5px); }
.btn-primary:disabled { opacity: .38; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-primary:disabled:hover { background: var(--ink); }

.btn-back {
  display: inline-flex; align-items: center; gap: 5px;
  background: none; border: none;
  font-size: 12.5px; color: var(--ink-soft);
  cursor: pointer; font-family: inherit;
  padding: 8px 0; margin-bottom: 4px;
  transition: color .2s;
}
.btn-back:hover { color: var(--ink); }

/* ─── Bottom Action Area ─── */
.bottom-action {
  padding: 16px 22px calc(20px + var(--safe-b));
  background: linear-gradient(to top, var(--paper) 65%, transparent);
  position: sticky; bottom: 0;
  max-width: 520px; width: 100%; margin: 0 auto;
}

/* ─── Page 2 Questions ─── */
.q-header { margin-top: 20px; margin-bottom: 26px; }
.q-step-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--warm-3); margin-bottom: 7px;
}
.q-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 700;
  line-height: 1.25; letter-spacing: -.5px;
}

/* Question row */
.question-header-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.question-text {
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 9px;
  flex: 1; margin-right: 10px;
}
.q-num {
  width: 24px; height: 24px;
  background: var(--ink); color: var(--white);
  border-radius: 50%;
  font-size: 11px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Option tags */
.q-options-row {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 18px;
}
.q-option-tag {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 16px;
  border-radius: 30px;
  border: 1.5px solid var(--warm-2);
  background: var(--white);
  font-size: 13px; color: var(--ink);
  cursor: pointer;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow: var(--shadow-sm);
}
.q-option-tag:hover {
  border-color: var(--ink);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.q-option-tag.selected {
  border-color: var(--accent);
  background: var(--accent-lt);
  box-shadow: 0 0 0 3px oklch(58% 0.21 28 / 0.12);
}
.q-option-tag.selected .q-option-label { color: var(--accent); }
.q-option-emoji { font-size: 16px; }
.q-option-label { font-weight: 600; }
.q-option-desc {
  font-size: 10.5px; color: var(--ink-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 72px;
}

/* Skeleton */
.skeleton-block { margin-bottom: 24px; }
.skeleton-q {
  height: 18px; width: 55%;
  background: linear-gradient(90deg, var(--warm-1) 25%, var(--warm-2) 50%, var(--warm-1) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
  border-radius: 4px; margin-bottom: 14px;
}
.skeleton-opts {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.skeleton-opt {
  height: 42px; width: 110px;
  background: linear-gradient(90deg, var(--warm-1) 25%, var(--warm-2) 50%, var(--warm-1) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
  border-radius: 30px;
}
.skeleton-opt:nth-child(2){animation-delay:.08s}
.skeleton-opt:nth-child(3){animation-delay:.16s}
.skeleton-opt:nth-child(4){animation-delay:.24s}
.skeleton-opt:nth-child(5){animation-delay:.32s}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ─── Loading Screen ─── */
.loading-screen {
  display: none;
  position: fixed; inset: 0; z-index: 150;
  background: var(--paper);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 18px;
}
.loading-screen.show { display: flex; }

.loading-icon-wrap {
  position: relative; width: 72px; height: 72px;
}
.loading-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--accent);
  animation: spin 1.2s linear infinite;
}
.loading-ring-2 {
  inset: 8px;
  border-top-color: var(--warm-3);
  animation-duration: .9s; animation-direction: reverse;
}
.loading-ring-3 {
  inset: 16px;
  border-top-color: var(--ink);
  animation-duration: .7s;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.loading-sub { font-size: 12.5px; color: var(--ink-soft); text-align: center; }
.loading-platforms {
  display: flex; gap: 9px; margin-top: 4px;
}
.lp {
  padding: 5px 14px; border-radius: 20px;
  font-size: 11.5px; font-weight: 700;
  animation: pulse 1.6s ease-in-out infinite;
}
.lp:nth-child(2){animation-delay:.3s}
.lp:nth-child(3){animation-delay:.6s}
@keyframes pulse {
  0%,100%{opacity:.35; transform:scale(.94)}
  50%{opacity:1; transform:scale(1)}
}
.lp-pdd { background: var(--accent-lt); color: var(--accent); }
.lp-tb  { background: oklch(95% 0.05 60); color: oklch(52% 0.15 50); }
.lp-1688{ background: oklch(94% 0.04 255); color: var(--blue); }

/* ─── Page 3: Results ─── */
.result-header { margin-top: 20px; margin-bottom: 18px; }
.result-eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10.5px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 10px;
}
.result-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 4px;
}
.result-sub { font-size: 12.5px; color: var(--ink-soft); }

/* Style card — editorial strip */
.style-card {
  background: var(--ink); color: var(--white);
  border-radius: var(--r-md);
  padding: 22px 22px 20px;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.style-card-bg {
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, oklch(65% 0.08 50 / .25) 0%, transparent 70%);
}
.style-card-bg2 {
  position: absolute;
  bottom: -30px; left: 30px;
  width: 90px; height: 90px; border-radius: 50%;
  background: radial-gradient(circle, oklch(58% 0.21 28 / .2) 0%, transparent 70%);
}
.style-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; position: relative; z-index: 1; }
.style-tag {
  background: oklch(99.5% 0 0 / .12);
  border: 1px solid oklch(99.5% 0 0 / .18);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px; font-weight: 500;
}
.style-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; margin-bottom: 7px;
  position: relative; z-index: 1;
}
.style-desc { font-size: 12.5px; color: oklch(99.5% 0 0 / .7); line-height: 1.55; position: relative; z-index: 1; }

/* Platform tabs */
.platform-tabs {
  display: flex; gap: 7px; margin-bottom: 16px;
  overflow-x: auto; padding-bottom: 2px; scrollbar-width: none;
}
.platform-tabs::-webkit-scrollbar { display: none; }
.pt-tab {
  flex-shrink: 0;
  padding: 7px 16px; border-radius: 20px;
  border: 1.5px solid var(--warm-2);
  background: var(--white);
  font-size: 12px; font-weight: 700; color: var(--ink-soft);
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.pt-tab.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
.pt-tab:not(.active):hover { border-color: var(--ink-soft); color: var(--ink); }

/* Product grid */
.products-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}

.prod-card {
  background: var(--white);
  border-radius: var(--r-md);
  overflow: hidden;
  border: 1.5px solid var(--warm-1);
  cursor: pointer;
  transition: all .28s cubic-bezier(.34,1.56,.64,1);
  box-shadow: var(--shadow-sm);
}
.prod-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--warm-2);
}
.prod-img-wrap {
  position: relative; padding-top: 100%;
  background: var(--warm-1); overflow: hidden;
}
.prod-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .5s cubic-bezier(.22,1,.36,1);
}
.prod-card:hover .prod-img { transform: scale(1.07); }

.prod-platform-badge {
  position: absolute; top: 8px; left: 8px;
  padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 800;
  letter-spacing: .3px;
  backdrop-filter: blur(8px);
}
.badge-pdd  { background: oklch(58% 0.21 28 / .82); color: var(--white); }
.badge-tb   { background: oklch(62% 0.18 50 / .82); color: var(--white); }
.badge-1688 { background: oklch(52% 0.18 255 / .82); color: var(--white); }

.prod-score {
  position: absolute; top: 8px; right: 8px;
  background: oklch(14% 0.01 60 / .72);
  color: var(--white);
  padding: 2px 7px; border-radius: 6px;
  font-size: 10px; font-weight: 700;
  backdrop-filter: blur(6px);
}

.prod-info { padding: 11px 11px 13px; }
.prod-name {
  font-size: 12px; font-weight: 600; color: var(--ink);
  line-height: 1.45; margin-bottom: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.prod-reason {
  font-size: 10.5px; color: var(--ink-soft); line-height: 1.4;
  margin-bottom: 9px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.prod-bottom { display: flex; align-items: center; justify-content: space-between; }
.prod-price { font-size: 17px; font-weight: 900; color: var(--accent); }
.prod-price-sub { font-size: 10px; color: var(--warm-3); }
.prod-buy-btn {
  background: var(--ink); color: var(--white);
  border: none; padding: 6px 11px;
  border-radius: var(--r-sm); font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: background .2s;
}
.prod-buy-btn:hover { background: var(--accent); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 44px; margin-bottom: 14px; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; margin-bottom: 7px; }
.empty-desc { font-size: 13.5px; color: var(--ink-soft); }

/* ─── Modal ─── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: oklch(14% 0.01 60 / .55);
  backdrop-filter: blur(6px) saturate(1.2);
  align-items: flex-end;
}
.overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: 26px 26px 0 0;
  width: 100%; max-width: 520px;
  margin: 0 auto;
  padding: 0 0 calc(40px + var(--safe-b));
  animation: slideUp .38s cubic-bezier(.22,1,.36,1);
  max-height: 90svh; overflow-y: auto;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--warm-2); border-radius: 2px;
  margin: 12px auto 0; cursor: pointer;
}
.modal-img-wrap {
  position: relative; padding-top: 60%; overflow: hidden; background: var(--warm-1);
}
.modal-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.modal-body { padding: 20px 22px 0; }
.modal-platform { margin-bottom: 9px; }
.modal-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 12px; line-height: 1.35; }

.modal-reason-box {
  background: var(--warm-1); border-radius: 12px;
  padding: 12px 15px; margin-bottom: 16px;
  border-left: 3px solid var(--accent);
}
.modal-reason-label { font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 4px; letter-spacing: 1.5px; text-transform: uppercase; }
.modal-reason-text { font-size: 13px; color: var(--ink); line-height: 1.55; }

.modal-meta { display: flex; gap: 20px; margin-bottom: 18px; }
.meta-item .k { font-size: 10.5px; color: var(--ink-soft); margin-bottom: 3px; }
.meta-item .v { font-size: 15px; font-weight: 700; }

.modal-price-row {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 16px;
}
.modal-price { font-size: 30px; font-weight: 900; color: var(--accent); font-family: 'Playfair Display', serif; }
.modal-price-ori { font-size: 13px; color: var(--ink-soft); text-decoration: line-through; }
.modal-buy-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px;
  background: var(--accent); color: var(--white);
  border: none; border-radius: var(--r-md);
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  letter-spacing: .3px;
}
.modal-buy-btn:hover {
  background: oklch(52% 0.21 28);

  document.getElementById('inputError').style.display='none';

function updateDots(step){

    else if(i===step) d.classList.add('active');

}

  document.getElementById('q1Container').style.display='none';
  document.getElementById('nextToQ2Btn').disabled=true;
  // 生成新的请求 ID
  const currentRequestId = ++q1RequestId;
  try{
    const res=await fetch(`${API_BASE}/api/ai/questions`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userInput:val,questionNumber:1})
    });
    const data=await res.json();
    // 检查是否是最新请求，防止竞态条件
    if(currentRequestId !== q1RequestId) return;
    state.question1=data.question||data.questions?.[0];
    renderQ1(state.question1);
    if(data.fallback) showToast('使用预设问题');

    // 检查是否是最新请求
    if(currentRequestId !== q1RequestId) return;
    const fb=getLocalFallbackQ1(val);

}

let q1AllOptions=[],q1DisplayIndexes=[],q1SelectedIndexes=[];
const OPTIONS_PER_PAGE=8;

function renderQ1(qData){
  q1AllOptions=qData.options||[];
  q1DisplayIndexes=[];q1SelectedIndexes=[];
  document.getElementById('q1Text').innerHTML=`<div class="q-num">1</div>${qData.question}`;
  // 直接设置显示索引并渲染，不发起额外的 API 请求
  q1DisplayIndexes=[...Array(q1AllOptions.length).keys()];
  renderQ1Options();
  document.getElementById('q1Loading').style.display='none';
  document.getElementById('q1Container').style.display='block';
}
async function refreshQ1Options(){
  // 收集当前显示的所有标签 value 作为 excludeTags
  const excludeTags = q1DisplayIndexes.map(idx => q1AllOptions[idx].value);
  // 生成新的请求 ID
  const currentRequestId = ++q1RequestId;

  try{
    const res=await fetch(`${API_BASE}/api/ai/questions`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userInput:state.input,questionNumber:1,excludeTags})
    });
    const data=await res.json();
    // 检查是否是最新请求，防止竞态条件
    if(currentRequestId !== q1RequestId) return;
    if(data.question && data.question.options){
      state.question1=data.question;
      q1AllOptions=data.question.options;
      q1DisplayIndexes=[...Array(q1AllOptions.length).keys()];
      renderQ1Options();
    }
  }catch(e){
    // 检查是否是最新请求
    if(currentRequestId !== q1RequestId) return;
    console.error('刷新问题一失败:', e);
    // 失败时保持原有逻辑，本地随机
    if(!q1AllOptions.length) return;
    const sel=new Set(q1SelectedIndexes);
    const avail=[...Array(q1AllOptions.length).keys()].filter(i=>!sel.has(i));
    q1DisplayIndexes=[...q1SelectedIndexes];
    const need=OPTIONS_PER_PAGE-q1DisplayIndexes.length;
    for(let i=0;i<need&&avail.length>0;i++){
      const r=Math.floor(Math.random()*avail.length);
      q1DisplayIndexes.push(avail[r]); avail.splice(r,1);
    }
    renderQ1Options();
  }
}
function renderQ1Options(){
  const row=document.getElementById('q1OptionsRow');
  row.innerHTML=q1DisplayIndexes.map(idx=>{
    const o=q1AllOptions[idx],sel=q1SelectedIndexes.includes(idx);
    return`<div class="q-option-tag${sel?' selected':''}" onclick="selectQ1Option(${idx})" data-index="${idx}">
      <span class="q-option-emoji">${o.emoji}</span>
      <span class="q-option-label">${o.label}</span>
      ${o.desc?`<span class="q-option-desc">${o.desc}</span>`:''}
    </div>`;
  }).join('');
  animateIn(row);
}
function animateIn(row){
  row.querySelectorAll('.q-option-tag,.tag-chip').forEach((el,i)=>{
    el.style.opacity='0'; el.style.transform='translateY(8px)';
    setTimeout(()=>{el.style.transition='all .28s ease';el.style.opacity='1';el.style.transform='translateY(0)';},i*38);
  });
}
function selectQ1Option(idx){
  const pos=q1SelectedIndexes.indexOf(idx);
  pos>-1 ? q1SelectedIndexes.splice(pos,1) : q1SelectedIndexes.push(idx);
  state.q1Answer=q1SelectedIndexes.map(i=>q1AllOptions[i].value);
  document.querySelectorAll('#q1OptionsRow .q-option-tag').forEach(t=>{
    t.classList.toggle('selected',q1SelectedIndexes.includes(parseInt(t.dataset.index)));
  });
  document.getElementById('nextToQ2Btn').disabled=q1SelectedIndexes.length===0;
}
function goToPage1(){
  showPage('page1'); updateDots(1);
  state.q1Answer=[];state.q2Answer=[];state.question1=null;state.question2=null;
  q1SelectedIndexes=[];q2SelectedIndexes=[];
}

/* ─── 2A → 2B ─── */
async function goToPage2B(){
  if(!state.q1Answer.length){ showToast('请至少选择一个标签'); return; }
  showPage('page2b'); updateDots(3);
  document.getElementById('q2Loading').style.display='block';
  document.getElementById('q2Container').style.display='none';
  document.getElementById('searchBtn').disabled=true;
  // 生成新的请求 ID
  const currentRequestId = ++q2RequestId;
  try{
    const res=await fetch(`${API_BASE}/api/ai/question2`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userInput:state.input,q1Answers:state.q1Answer})
    });
    // 检查是否是最新请求，防止竞态条件
    if(currentRequestId !== q2RequestId) return;
    if(!res.ok) throw new Error('API error');
    const data=await res.json();
    if(!data.question) throw new Error('No question');
    state.question2=data.question; renderQ2(state.question2);
  }catch(e){
    // 检查是否是最新请求
    if(currentRequestId !== q2RequestId) return;
    console.error('获取问题二失败:', e);
    const fb=getLocalFallbackQ2(state.input,state.q1Answer);
    state.question2=fb; renderQ2(fb);
    showToast('使用预设问题');
  }
}
function getLocalFallbackQ2(userInput,q1Answers){
  // 提取非价格标签
  const nonPriceTags=(q1Answers||[]).filter(a=>a&&!a.startsWith('PRICE:'));
  const firstTag=nonPriceTags[0]||'';

  // 构建场景选项
  const scenes=[
    {emoji:'💼',label:'通勤',desc:'上班日常',value:'通勤'},{emoji:'🏃',label:'运动',desc:'健身户外',value:'运动'},
    {emoji:'🎒',label:'学生',desc:'校园使用',value:'学生'},{emoji:'🎁',label:'送礼',desc:'送人有面子',value:'送礼'},
    {emoji:'🛏️',label:'居家',desc:'日常舒适',value:'居家'},{emoji:'🎉',label:'聚会',desc:'派对活动',value:'聚会'}
  ];

  // 构建风格选项
  const styles=[
    {emoji:'🤍',label:'简约',desc:'百搭不出错',value:'简约'},{emoji:'🌸',label:'甜美',desc:'少女风',value:'甜美'},
    {emoji:'🖤',label:'酷帅',desc:'个性街头',value:'酷帅'},{emoji:'🌿',label:'文艺',desc:'气质独特',value:'文艺'},
    {emoji:'✨',label:'质感',desc:'高级精致',value:'质感'},{emoji:'🎀',label:'可爱',desc:'萌系减龄',value:'可爱'}
  ];

  // 检测品类
  const cats={'包':'背包','衣':'衣服','鞋':'鞋子','帽':'帽子','耳机':'耳机'};
  let cat='商品';
  for(const[k,v] of Object.entries(cats)) if(userInput.includes(k)){ cat=v; break; }

  // 根据是否有非价格标签决定问题类型
  if(firstTag){
    // 如果问题一有选风格，问题二问场景
    return{question:`既然想要${firstTag}风格的${cat}，主要用于什么场景？`,options:scenes};
  }else{
    // 如果问题一只有价格，问题二问风格
    return{question:`想要什么样的${cat}风格？`,options:styles};
  }
}

let q2AllOptions=[],q2DisplayIndexes=[],q2SelectedIndexes=[];
function renderQ2(qData){
  q2AllOptions=qData.options||[];q2DisplayIndexes=[];q2SelectedIndexes=[];
  document.getElementById('q2Text').innerHTML=`<div class="q-num">2</div>${qData.question}`;
  // 直接设置显示索引并渲染，不发起额外的 API 请求
  q2DisplayIndexes=[...Array(q2AllOptions.length).keys()];
  renderQ2Options();
  document.getElementById('q2Loading').style.display='none';
  document.getElementById('q2Container').style.display='block';
}
async function refreshQ2Options(){
  // 收集当前显示的所有标签 value 作为 excludeTags
  const excludeTags = q2DisplayIndexes.map(idx => q2AllOptions[idx].value);
  // 生成新的请求 ID
  const currentRequestId = ++q2RequestId;

  try{
    const res=await fetch(`${API_BASE}/api/ai/question2`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userInput:state.input,q1Answers:state.q1Answer,excludeTags})
    });
    const data=await res.json();
    // 检查是否是最新请求，防止竞态条件
    if(currentRequestId !== q2RequestId) return;
    if(data.question && data.question.options){
      state.question2=data.question;
      q2AllOptions=data.question.options;
      q2DisplayIndexes=[...Array(q2AllOptions.length).keys()];
      renderQ2Options();
    }
  }catch(e){
    // 检查是否是最新请求
    if(currentRequestId !== q2RequestId) return;
    console.error('刷新问题二失败:', e);
    // 失败时保持原有逻辑，本地随机
    if(!q2AllOptions.length) return;
    const sel=new Set(q2SelectedIndexes);
    const avail=[...Array(q2AllOptions.length).keys()].filter(i=>!sel.has(i));
    q2DisplayIndexes=[...q2SelectedIndexes];
    const need=OPTIONS_PER_PAGE-q2DisplayIndexes.length;
    for(let i=0;i<need&&avail.length>0;i++){
      const r=Math.floor(Math.random()*avail.length);
      q2DisplayIndexes.push(avail[r]); avail.splice(r,1);
    }
    renderQ2Options();
  }
}
function renderQ2Options(){
  const row=document.getElementById('q2OptionsRow');
  row.innerHTML=q2DisplayIndexes.map(idx=>{
    const o=q2AllOptions[idx],sel=q2SelectedIndexes.includes(idx);
    return`<div class="q-option-tag${sel?' selected':''}" onclick="selectQ2Option(${idx})" data-index="${idx}">
      <span class="q-option-emoji">${o.emoji}</span>
      <span class="q-option-label">${o.label}</span>
      ${o.desc?`<span class="q-option-desc">${o.desc}</span>`:''}
    </div>`;
  }).join('');
  animateIn(row);
}
function selectQ2Option(idx){
  const pos=q2SelectedIndexes.indexOf(idx);
  pos>-1 ? q2SelectedIndexes.splice(pos,1) : q2SelectedIndexes.push(idx);
  state.q2Answer=q2SelectedIndexes.map(i=>q2AllOptions[i].value);
  document.querySelectorAll('#q2OptionsRow .q-option-tag').forEach(t=>{
    t.classList.toggle('selected',q2SelectedIndexes.includes(parseInt(t.dataset.index)));
  });
  document.getElementById('searchBtn').disabled=q2SelectedIndexes.length===0;
}
function goToPage2A(){
  showPage('page2a'); updateDots(2);
  state.q2Answer=[]; q2SelectedIndexes=[];
}

/* ─── Search ─── */
async function startSearch(){
  if(!state.q1Answer.length||!state.q2Answer.length){ showToast('请至少完成两道问题的选择'); return; }
  document.getElementById('loadingScreen').classList.add('show');
  try{
    const res=await fetch(`${API_BASE}/api/ai/recommend`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userInput:state.input,q1Answers:state.q1Answer,q2Answers:state.q2Answer})
    });
    const data=await res.json();
    state.products=data.products;
    buildResultPage(data.styleProfile,data.products);
    document.getElementById('loadingScreen').classList.remove('show');
    showPage('page3'); updateDots(4);
  }catch(e){
    const mock=getLocalMockData();
    state.products=mock.products;
    buildResultPage(mock.styleProfile,mock.products);
    document.getElementById('loadingScreen').classList.remove('show');
    showPage('page3'); updateDots(4);
    showToast('使用离线数据');
  }
}

function buildResultPage(sp,products){
  document.getElementById('styleName').textContent=sp.name;
  document.getElementById('styleDesc').textContent=sp.desc;
  const te=document.getElementById('styleTags');
  te.innerHTML=sp.tags.map(t=>`<span class="style-tag">${t}</span>`).join('');
  renderProducts('all');
}

function renderProducts(filter){
  const grid=document.getElementById('productsGrid');
  const empty=document.getElementById('emptyState');
  const filtered=filter==='all'?state.products:state.products.filter(p=>p.platform===filter);
  document.getElementById('resultCount').textContent=filtered.length;
  if(!filtered.length){ grid.style.display='none'; empty.style.display='block'; return; }
  grid.style.display='grid'; empty.style.display='none';
  grid.innerHTML='';
  filtered.forEach(p=>{
    const div=document.createElement('div');
    div.className='prod-card';
    div.innerHTML=`
      <div class="prod-img-wrap">
        <img class="prod-img" src="${p.img}" alt="${p.name}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23EDE9E1%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%239A9082%22 font-size=%2211%22>暂无图片</text></svg>'">
        <span class="prod-platform-badge ${p.badgeClass}">${p.platformLabel}</span>
        <span class="prod-score">⭐ ${p.score||p.aiScore}</span>
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-reason">${p.reason||p.aiReason}</div>
        <div class="prod-bottom">
          <div>
            <div class="prod-price">¥${p.price}</div>
            <div class="prod-price-sub">原价¥${p.priceOri}</div>
          </div>
          <button class="prod-buy-btn">查看</button>
        </div>
      </div>`;
    div.onclick=(e)=>{ if(!e.target.classList.contains('prod-buy-btn')) openModal(p); };
    div.querySelector('.prod-buy-btn').onclick=(e)=>{ e.stopPropagation(); openModal(p); };
    grid.appendChild(div);
  });
}

function filterPlatform(el,val){
  document.querySelectorAll('.pt-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  state.currentFilter=val;
  renderProducts(val);
}

/* ─── Modal ─── */
function openModal(p){
  document.getElementById('modalImg').src=p.img;
  document.getElementById('modalName').textContent=p.name;
  document.getElementById('modalReason').textContent=p.reason||p.aiReason||'符合你的风格偏好，性价比高';
  document.getElementById('modalSales').textContent=p.sales||'1万+';
  document.getElementById('modalScore').textContent=(p.score||p.aiScore)+' 分';
  document.getElementById('modalPrice').textContent='¥'+p.price;
  document.getElementById('modalPriceOri').textContent='原价 ¥'+p.priceOri;
  document.getElementById('modalPlatform').innerHTML=`<span class="prod-platform-badge ${p.badgeClass}" style="position:static;display:inline-block">${p.platformLabel}</span>`;
  document.getElementById('modalBuyBtn').onclick=async()=>{
    if(p.platform==='pdd'&&p.url&&p.url!=='#'){
      try{
        const res=await fetch(`${API_BASE}/api/promotion/url`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platform:'pdd',goodsId:p.url})});
        const data=await res.json();
        if(data.url&&data.url!=='#'){window.open(data.url,'_blank');return;}
      }catch(e){}
      // API调用失败，直接跳转到商品页
      window.open(`https://mobile.yangkeduo.com/goods.html?goods_sign=${p.url}`,'_blank');
    } else if(p.url&&p.url!=='#'){
      window.open(p.url,'_blank');
    }
    else showToast('购买链接开发中');
  };
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow='';
  }
}
document.getElementById('modalHandle').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
});

/* ─── Init ─── */
document.addEventListener('DOMContentLoaded',()=>{
  updateCharCount();
  refreshTags();
});
